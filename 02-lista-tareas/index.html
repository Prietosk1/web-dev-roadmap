<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Lista de tareas</title>
</head>

<body>
    <div id="main-container">
        <h1>Lista de tareas</h1>

        <form id="add-task-container">
            <label>Nombre de nueva tarea</label>
            <div id="task-input">
                <input type="text" required>
                <button>Agregar</button>
            </div>
        </form>


        <h2>Tareas</h2>
        <ul class="todo-list">
            <li>
                <label>
                    <input type="checkbox">
                    <span>Aprender HTML</span>
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox">
                    <span>Aprender CSS</span>
                </label>
            </li>
            <li>
                <label>
                    <input type="checkbox">
                    <span>Hacer calistenia</span>
                </label>
            </li>
        </ul>
    </div>
</body>

</html>
